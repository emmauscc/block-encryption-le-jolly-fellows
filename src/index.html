<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Block Encryptor</title>
    <script src="./scripts/encrypt.js"></script>
    <script src="./scripts/common.js"></script>
  </head>

  <body>
    <main class="container">
      <h1>Welcome to Block Encryptor</h1>

      <div class="row">
        <img src="./assets/block-encryptor.svg" class="logo block-encryptor" alt="Block Encryptor logo" />
      </div>
      <p id="header">Input your text that you wish to encrypt below.</p>

      <form class="row" id="greet-form">
        <input id="greet-input" placeholder="Text..." />
        <button onClick="getInfo()" type="submit">Greet</button>
      </form>
      <p id="greet-msg"></p>
    </main>
  </body>
</html>
