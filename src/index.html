<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="./assets/favicon.png">

    <title>Block Encryptor</title>

    <script src="./scripts/common.js" type="text/javascript"></script>
    <script src="./scripts/decrypt.js" type="text/javascript"></script>
    <script src="./scripts/encrypt.js" type="text/javascript"></script>
    <script src="./scripts/main.js" type="text/javascript"></script>
  </head>

  <body>
    <main class="container">
      <h1>Welcome to Block Encryptor</h1>

      <div class="row">
        <img
          src="./assets/block-encryptor.svg"
          class="logo block-encryptor"
          alt="Block Encryptor logo"
        />
      </div>

      <p>Input your text that you wish to encrypt or decrypt below.</p>

      <form class="row" onSubmit="return false;">
        <input id="text-input" onblur="displayCipherDropdown()" placeholder="Text to use..." />
      </form>

      <form class="row" onSubmit="return false;">
        <select id="cipherDropdown">
          <option value="caesar">Caesar Cipher</option>
          <option value="vigenere">Vigenere Cipher</option>
        </select>
      </form>

      <form class="row" onSubmit="return false;">
        <input id="key-input" oninput="displayModeDropdown()" placeholder="Encryption Key..." />
      </form>

      <form class="row" onSubmit="return false;">
        <select id="modeDropdown" onchange="displayIVText()">
          <option value="encrypt">Encryption</option>
          <option value="decrypt">Decryption</option>
        </select>
      </form>

      <form class="row" onSubmit="return false;">
        <input id="iv-input" placeholder="Initialization vector..." />
      </form>

      <form class="row" onSubmit="return false;">
        <button type="button" id="runButton" onclick="workInput()">Run!</button>
      </form>

      <h1>Output</h1>

      <form class="row" onSubmit="return false;">
        <div id="output">Waiting for either encryption or decryption...</div>
      </form>
    </main>
  </body>
</html>
