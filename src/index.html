<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Block Encryptor</title>

    <script src="./scripts/common.js" type="text/javascript"></script>
    <script src="./scripts/decrypt.js" type="text/javascript"></script>
    <script src="./scripts/encrypt.js" type="text/javascript"></script>
    <script src="./scripts/main.js" type="text/javascript"></script>
  </head>

  <body>
    <main class="container">
      <h1>Welcome to Block Encryptor</h1>

      <div class="row">
        <img
          src="./assets/block-encryptor.svg"
          class="logo block-encryptor"
          alt="Block Encryptor logo"
        />
      </div>

      <p id="header">Input your text that you wish to encrypt below.</p>

      <form class="row" id="greet-form">
        <input id="text-input" placeholder="Text to Encrypt..." />
      </form>

      <form class="row" id="greet-form">
        <input id="key-input" placeholder="Encryption Key (0-127)..." />
      </form>

      <form class="row" id="greet-form">
        <input id="iv-input" placeholder="Initialization vector..." />
      </form>

      <form class="row" id="greet-form">
        <select>
          <option>Cesar Cipher</option>
          <option>Vigenere Cipher</option>
        </select>
      </form>

      <form class="row" id="greet-form">
        <button type="button" onclick="encryptInput()">Encrypt</button>
        <button type="button" onclick="decryptInput()">Decrypt</button>
      </form>

      <p id="greet-msg"></p>
      <p id="greet-msg"></p>
    </main>
  </body>
</html>
